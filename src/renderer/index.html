<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentic Browser</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="chrome">
    <div id="header-surface">
      <div id="tab-bar">
        <div id="tabs"></div>
        <button id="btn-new-tab" title="New Tab" aria-label="New Tab">+</button>
      </div>
      <div id="window-controls">
        <button id="btn-minimize" title="Minimize" aria-label="Minimize window">
          <span class="window-glyph glyph-minimize"></span>
        </button>
        <button id="btn-maximize" title="Maximize" aria-label="Maximize window">
          <span class="window-glyph glyph-maximize"></span>
        </button>
        <button id="btn-close" title="Close" aria-label="Close window">
          <span class="window-glyph glyph-close"></span>
        </button>
      </div>
    </div>

    <div id="nav-bar">
      <button id="btn-back" title="Back" aria-label="Back">&#8592;</button>
      <button id="btn-forward" title="Forward" aria-label="Forward">&#8594;</button>
      <button id="btn-reload" title="Reload" aria-label="Reload">&#8635;</button>
      <input id="address-bar" type="text" placeholder="Search or enter URL..." spellcheck="false" />
    </div>
  </div>

  <div id="workspace">
    <aside id="chat-shell" aria-label="Agent chat">
      <div id="chat-shell-header">
        <div>
          <p id="chat-eyebrow">Agent Session</p>
          <h1 id="chat-title">No active tab</h1>
        </div>
      </div>
      <div id="chat-messages" aria-live="polite"></div>
      <form id="chat-form">
        <label id="chat-input-label" for="chat-input">Ask the agent</label>
        <textarea
          id="chat-input"
          rows="4"
          placeholder="Ask the agent to inspect, navigate, and work through this page..."
        ></textarea>
        <button id="chat-send" type="submit">Send</button>
      </form>
    </aside>
    <section id="browser-stage" aria-hidden="true"></section>
  </div>

  <script src="../../dist/renderer/index.js"></script>
</body>
</html>
